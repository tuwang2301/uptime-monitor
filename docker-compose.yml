version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uptime-backend
    restart: always
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
      - TELEGRAM_ALERT_ENABLED=false
    networks:
      - uptime-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uptime-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - uptime-network

networks:
  uptime-network:
    driver: bridge
